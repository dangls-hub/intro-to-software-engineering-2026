spring:
  application:
    name: ams-backend

  datasource:
    # Docker Compose đang expose MySQL ra port 3307 trên máy host.
    # Nếu dùng MySQL local ở port 3306, đổi lại port trong URL bên dưới.
    url: jdbc:mysql://localhost:3307/bluemoon_ams?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: NhapMonCongNghePhanMem
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # update: tự động tạo/cập nhật bảng dựa trên Entity.
      # Lưu ý: Lên môi trường Production sẽ đổi thành 'validate' hoặc 'none'
      ddl-auto: update
    show-sql: true          # In câu lệnh SQL ra console để dễ debug
    properties:
      hibernate:
        format_sql: true    # Format câu SQL cho dễ đọc
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080                # Port chạy backend
