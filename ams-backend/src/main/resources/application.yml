spring:
  application:
    name: ams-backend

  datasource:
    # Dùng H2 in-memory database cho dev khi không có MySQL/Docker.
    # Khi có Docker MySQL, đổi lại url/driver sang MySQL.
    url: jdbc:h2:mem:bluemoon_ams;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret-key: BlueMoonAMS2026SecretKeyForJWTTokenGenerationDoNotUseInProduction
    expiration-ms: 86400000
