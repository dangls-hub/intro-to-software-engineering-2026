<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2535"/>
      <stop offset="100%" stop-color="#071018"/>
    </radialGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4dd0e1"/>
      <stop offset="60%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80deea" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#29b6f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="moonClip">
      <!-- Crescent = large circle minus offset circle -->
      <path d="M256,80 a176,176 0 1,1 0,352 a176,176 0 1,1 0,-352 z"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Outer glow halo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0288d1" stroke-width="2" stroke-opacity="0.15" filter="url(#glow)"/>

  <!-- Crescent moon shape -->
  <!-- Full moon disc -->
  <circle cx="256" cy="256" r="176" fill="url(#moonGrad)" filter="url(#softGlow)"/>
  <!-- Cut-out to make crescent -->
  <circle cx="318" cy="220" r="148" fill="#071018"/>

  <!-- Rim highlight on crescent edge -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#glowGrad)" stroke-width="3"/>

  <!-- Building silhouette inside the crescent visible area -->
  <!-- Main building -->
  <rect x="148" y="290" width="50" height="80" rx="3" fill="#0d2535" opacity="0.9"/>
  <!-- Building windows -->
  <rect x="157" y="300" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.8"/>
  <rect x="175" y="300" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.8"/>
  <rect x="157" y="318" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.6"/>
  <rect x="175" y="318" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.6"/>
  <rect x="157" y="336" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.8"/>
  <rect x="175" y="336" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.6"/>
  <!-- Tall center building -->
  <rect x="205" y="255" width="42" height="115" rx="3" fill="#0d2535" opacity="0.9"/>
  <rect x="213" y="265" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.9"/>
  <rect x="230" y="265" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.9"/>
  <rect x="213" y="283" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.7"/>
  <rect x="230" y="283" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.9"/>
  <rect x="213" y="301" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.9"/>
  <rect x="230" y="301" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.7"/>
  <rect x="213" y="319" width="10" height="10" rx="1" fill="#29b6f6" opacity="0.7"/>
  <rect x="230" y="319" width="10" height="10" rx="1" fill="#4dd0e1" opacity="0.9"/>
  <!-- Rooftop antenna -->
  <rect x="224" y="242" width="4" height="14" rx="1" fill="#4dd0e1" opacity="0.7"/>
  <circle cx="226" cy="241" r="3" fill="#80deea" opacity="0.9"/>

  <!-- Ground line -->
  <rect x="120" y="370" width="220" height="3" rx="1.5" fill="#0288d1" opacity="0.3"/>

  <!-- Star accents -->
  <circle cx="170" cy="155" r="2.5" fill="#80deea" opacity="0.7"/>
  <circle cx="195" cy="130" r="1.5" fill="#b3e5fc" opacity="0.6"/>
  <circle cx="145" cy="190" r="1.8" fill="#80deea" opacity="0.5"/>
  <circle cx="210" cy="168" r="1.2" fill="#b3e5fc" opacity="0.8"/>
</svg>
