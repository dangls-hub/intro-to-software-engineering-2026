name: Playwright Tests
on:
  push:
    branches: [ main, master, feature/playwright-e2e-tests ]
  pull_request:
    branches: [ main, master, feature/playwright-e2e-tests ]
jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: NhapMonCongNghePhanMem
          MYSQL_DATABASE: bluemoon_ams
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Start Spring Boot Backend
      run: |
        cd ams-backend
        chmod +x mvnw
        ./mvnw spring-boot:run &
      env:
        SPRING_MAIL_PASSWORD: iurk rpbv dfwp ltbu

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: |
        npm install
        cd ams-frontend && npm install

    - name: Wait for Backend Health Check
      run: |
        echo "Waiting for Spring Boot backend to start..."
        until curl --silent --fail http://localhost:8080/api/v1/health; do
          sleep 2
        done
        echo "Backend is up and running!"

    - name: Load Database Seed Data
      run: |
        mysql -h 127.0.0.1 -P 3307 -u root -p"NhapMonCongNghePhanMem" bluemoon_ams < database/seed/sample_data.sql
        echo "Seed data successfully loaded!"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E Tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
